<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>learnCode - Learning Path Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap");

      * {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
      }

      @keyframes pulse-slow {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.8;
        }
      }

      @keyframes shimmer {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(100%);
        }
      }

      .animate-pulse-slow {
        animation: pulse-slow 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }

      .animate-shimmer {
        animation: shimmer 2s linear infinite;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }

      ::-webkit-scrollbar-track {
        background: #0a0a0a;
      }

      ::-webkit-scrollbar-thumb {
        background: #2d2d2d;
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #333333;
      }
    </style>
  </head>
  <body class="bg-black">
    <div id="root"></div>

    <!-- React and Babel -->
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
      const { useState, useEffect } = React;

      // Lucide Icon Components
      const Lock = ({ className, ...props }) => {
        useEffect(() => {
          lucide.createIcons();
        }, []);
        return <i data-lucide="lock" className={className} {...props}></i>;
      };

      const Star = ({ className, fill, ...props }) => {
        useEffect(() => {
          lucide.createIcons();
        }, []);
        return (
          <i
            data-lucide="star"
            className={className}
            style={{ fill: fill || "none" }}
            {...props}
          ></i>
        );
      };

      const Play = ({ className, fill, ...props }) => {
        useEffect(() => {
          lucide.createIcons();
        }, []);
        return (
          <i
            data-lucide="play"
            className={className}
            style={{ fill: fill || "none" }}
            {...props}
          ></i>
        );
      };

      const CheckCircle = ({ className, ...props }) => {
        useEffect(() => {
          lucide.createIcons();
        }, []);
        return (
          <i data-lucide="check-circle" className={className} {...props}></i>
        );
      };

      const Trophy = ({ className, ...props }) => {
        useEffect(() => {
          lucide.createIcons();
        }, []);
        return <i data-lucide="trophy" className={className} {...props}></i>;
      };

      const Zap = ({ className, fill, ...props }) => {
        useEffect(() => {
          lucide.createIcons();
        }, []);
        return (
          <i
            data-lucide="zap"
            className={className}
            style={{ fill: fill || "none" }}
            {...props}
          ></i>
        );
      };

      const LearningPath = () => {
        const [levels, setLevels] = useState([
          {
            id: 1,
            title: "Variables & Data Types",
            status: "completed",
            stars: 3,
            xp: 50,
          },
          {
            id: 2,
            title: "Control Flow",
            status: "completed",
            stars: 3,
            xp: 50,
          },
          {
            id: 3,
            title: "Functions Basics",
            status: "completed",
            stars: 2,
            xp: 40,
          },
          {
            id: 4,
            title: "Lists & Tuples",
            status: "current",
            stars: 0,
            xp: 0,
          },
          { id: 5, title: "Dictionaries", status: "locked", stars: 0, xp: 0 },
          {
            id: 6,
            title: "Object-Oriented Programming",
            status: "locked",
            stars: 0,
            xp: 0,
          },
          { id: 7, title: "File Handling", status: "locked", stars: 0, xp: 0 },
          { id: 8, title: "Error Handling", status: "locked", stars: 0, xp: 0 },
          {
            id: 9,
            title: "Modules & Packages",
            status: "locked",
            stars: 0,
            xp: 0,
          },
          {
            id: 10,
            title: "Final Project",
            status: "locked",
            stars: 0,
            xp: 0,
            isFinal: true,
          },
        ]);

        const totalXP = 500;
        const earnedXP = levels.reduce((sum, level) => sum + level.xp, 0);
        const progressPercentage = (earnedXP / totalXP) * 100;

        const handleLevelClick = (level) => {
          if (level.status === "current") {
            alert(`Starting level: ${level.title}`);
          }
        };

        return (
          <div className="min-h-screen bg-black text-white">
            {/* Sticky Progress Header */}
            <div className="sticky top-0 z-50 bg-black/95 backdrop-blur-sm border-b border-[#2D2D2D]">
              <div className="max-w-4xl mx-auto px-6 py-4">
                <div className="flex items-center justify-between mb-3">
                  <div className="flex items-center gap-3">
                    {/* Python Flag/Icon */}
                    <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-[#3B82F6] to-[#60A5FA] flex items-center justify-center text-2xl font-bold shadow-lg">
                      Py
                    </div>
                    <div>
                      <h1 className="text-xl font-bold">Python Mastery</h1>
                      <p className="text-sm text-[#9CA3AF]">
                        Level{" "}
                        {levels.filter((l) => l.status === "completed").length}{" "}
                        of {levels.length}
                      </p>
                    </div>
                  </div>
                  <div className="flex items-center gap-2 bg-[#1a1a1a] px-4 py-2 rounded-lg border border-[#2D2D2D]">
                    <Zap className="w-5 h-5 text-[#EF4444]" fill="#EF4444" />
                    <span className="font-bold text-lg">{earnedXP}</span>
                    <span className="text-[#9CA3AF] text-sm">XP</span>
                  </div>
                </div>

                {/* Progress Bar */}
                <div className="relative">
                  <div className="h-3 bg-[#1a1a1a] rounded-full overflow-hidden border border-[#2D2D2D]">
                    <div
                      className="h-full bg-gradient-to-r from-[#EF4444] via-[#F97316] to-[#EF4444] rounded-full transition-all duration-500 shadow-lg"
                      style={{ width: `${progressPercentage}%` }}
                    >
                      <div className="h-full w-full bg-gradient-to-r from-transparent via-white/20 to-transparent animate-shimmer"></div>
                    </div>
                  </div>
                  <div className="flex justify-between mt-1 text-xs text-[#6B7280]">
                    <span>{earnedXP} XP</span>
                    <span>{totalXP} XP</span>
                  </div>
                </div>
              </div>
            </div>

            {/* Learning Path */}
            <div className="max-w-4xl mx-auto px-6 py-12">
              <div className="relative">
                {/* Central Path Line */}
                <div className="absolute left-1/2 top-0 bottom-0 w-1 -translate-x-1/2">
                  <div className="w-full h-full bg-gradient-to-b from-[#EF4444] via-[#A855F7] to-[#3B82F6] opacity-30"></div>
                </div>

                {/* Level Nodes */}
                <div className="relative space-y-8">
                  {levels.map((level, index) => (
                    <LevelNode
                      key={level.id}
                      level={level}
                      index={index}
                      isEven={index % 2 === 0}
                      onClick={() => handleLevelClick(level)}
                    />
                  ))}
                </div>

                {/* Trophy at the end */}
                <div className="flex justify-center mt-12">
                  <div className="relative">
                    <div className="w-20 h-20 rounded-2xl bg-gradient-to-br from-[#EF4444] to-[#DC2626] flex items-center justify-center shadow-2xl border-4 border-[#2D2D2D] opacity-30">
                      <Trophy className="w-10 h-10" />
                    </div>
                    <div className="absolute -bottom-8 left-1/2 -translate-x-1/2 whitespace-nowrap text-sm text-[#6B7280] font-semibold">
                      Course Complete
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      };

      const LevelNode = ({ level, index, isEven, onClick }) => {
        const getNodeStyles = () => {
          switch (level.status) {
            case "completed":
              return {
                container:
                  "bg-gradient-to-br from-[#EF4444] to-[#DC2626] shadow-lg shadow-[#EF4444]/40 scale-100 cursor-pointer hover:scale-105",
                icon: <CheckCircle className="w-8 h-8" />,
                glow: true,
              };
            case "current":
              return {
                container:
                  "bg-gradient-to-br from-[#3B82F6] to-[#60A5FA] shadow-2xl shadow-[#3B82F6]/60 scale-110 cursor-pointer hover:scale-115 animate-pulse-slow",
                icon: <Play className="w-8 h-8" fill="white" />,
                glow: true,
              };
            case "locked":
              return {
                container:
                  "bg-[#1a1a1a] border-2 border-[#2D2D2D] opacity-50 scale-100",
                icon: <Lock className="w-6 h-6 text-[#6B7280]" />,
                glow: false,
              };
            default:
              return {};
          }
        };

        const styles = getNodeStyles();

        return (
          <div
            className={`flex items-center gap-8 ${isEven ? "flex-row" : "flex-row-reverse"}`}
          >
            {/* Content Card */}
            <div className={`flex-1 ${isEven ? "text-right" : "text-left"}`}>
              <div
                className={`inline-block bg-[#1a1a1a] rounded-xl p-6 border border-[#2D2D2D] transition-all duration-300 ${
                  level.status === "current"
                    ? "shadow-lg shadow-[#3B82F6]/20 hover:shadow-xl hover:shadow-[#3B82F6]/30"
                    : "hover:border-[#333333]"
                } ${level.status !== "locked" ? "cursor-pointer" : ""}`}
                onClick={onClick}
              >
                <div className="flex items-center gap-2 mb-2">
                  {isEven ? (
                    <>
                      <h3 className="text-lg font-bold flex-1">
                        {level.title}
                      </h3>
                      <span className="text-xs font-semibold text-[#9CA3AF] bg-[#0d0d0d] px-3 py-1 rounded-md uppercase tracking-wider">
                        Level {level.id}
                      </span>
                    </>
                  ) : (
                    <>
                      <span className="text-xs font-semibold text-[#9CA3AF] bg-[#0d0d0d] px-3 py-1 rounded-md uppercase tracking-wider">
                        Level {level.id}
                      </span>
                      <h3 className="text-lg font-bold flex-1">
                        {level.title}
                      </h3>
                    </>
                  )}
                </div>

                {/* Stars for completed levels */}
                {level.status === "completed" && (
                  <div
                    className={`flex gap-1 mt-3 ${isEven ? "justify-end" : "justify-start"}`}
                  >
                    {[1, 2, 3].map((star) => (
                      <Star
                        key={star}
                        className={`w-5 h-5 ${star <= level.stars ? "text-[#EF4444]" : "text-[#2D2D2D]"}`}
                        fill={star <= level.stars ? "#EF4444" : "none"}
                      />
                    ))}
                  </div>
                )}

                {/* XP Badge */}
                {level.xp > 0 && (
                  <div
                    className={`flex items-center gap-1 mt-2 ${isEven ? "justify-end" : "justify-start"}`}
                  >
                    <Zap className="w-4 h-4 text-[#EF4444]" fill="#EF4444" />
                    <span className="text-sm font-semibold text-[#9CA3AF]">
                      +{level.xp} XP
                    </span>
                  </div>
                )}

                {/* Start Button for current level */}
                {level.status === "current" && (
                  <button className="mt-4 bg-[#EF4444] hover:bg-[#DC2626] text-white font-semibold px-6 py-2 rounded-lg transition-all duration-300 shadow-lg shadow-[#EF4444]/40 hover:shadow-xl hover:shadow-[#EF4444]/60 flex items-center gap-2">
                    <Play className="w-4 h-4" fill="white" />
                    Start Level
                  </button>
                )}
              </div>
            </div>

            {/* Central Node */}
            <div className="relative flex-shrink-0">
              <div
                className={`w-16 h-16 rounded-2xl flex items-center justify-center transition-all duration-300 ${styles.container}`}
                onClick={level.status === "current" ? onClick : undefined}
              >
                {styles.icon}

                {/* Glow effect for active/completed */}
                {styles.glow && (
                  <div className="absolute inset-0 rounded-2xl blur-xl opacity-50 -z-10 bg-inherit"></div>
                )}
              </div>

              {/* Final Level Trophy Badge */}
              {level.isFinal && (
                <div className="absolute -top-2 -right-2 w-6 h-6 bg-gradient-to-br from-[#EF4444] to-[#DC2626] rounded-full flex items-center justify-center border-2 border-black">
                  <Trophy className="w-3 h-3" />
                </div>
              )}
            </div>

            {/* Spacer for the other side */}
            <div className="flex-1"></div>
          </div>
        );
      };

      // Render the app
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<LearningPath />);
    </script>
  </body>
</html>
